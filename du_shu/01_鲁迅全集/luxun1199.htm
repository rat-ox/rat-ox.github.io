悼杨铨</div>

<p><!--HTMLBUILERPART0-->
　　（１９３３年）　<BR><BR> 
　　岂有豪情似旧时，花开花落两由之。<BR><BR> 
　　何期泪洒江南雨，又为斯民哭健儿。<BR><BR> 
　　六月二十一日<BR><BR> 
　　杨铨，字杏佛，民权保障同盟执行委员，1933年6月18日为国民党蓝衣社特务暗杀于上海，20日鲁迅曾往万国殡仪馆送殓。许寿裳《亡友鲁迅印象记》：“是日大雨，鲁迅送殓回去，成诗一首：（略）。这首诗才气纵横，富于新意，无异于龚自珍。”<!--/HTMLBUILERPART0--> <br>
