莲蓬人</div>

<p><!--HTMLBUILERPART0-->
　　（１９００年） <BR><BR> 
　　芰裳荇带处仙乡①，风定犹闻碧玉香。<BR><BR> 
　　鹭影不来秋瑟瑟，苇花伴宿露［氵襄］［氵襄］。<BR><BR> 
　　扫除腻粉呈风骨，褪却红衣学淡妆。<BR><BR> 
　　好向濂溪称净植②，莫随残叶堕寒塘。 <BR><BR> 
　　①芰裳：屈原《离骚》：“制芰荷以为衣兮，集芙蓉（荷花）以为裳。”荇带：杜甫《曲江对雨》：“水荇牵风翠带长。”<BR><BR> 
　　②濂溪，即宋朝周敦颐，作有《爱莲说》。　<!--/HTMLBUILERPART0--> <br>
