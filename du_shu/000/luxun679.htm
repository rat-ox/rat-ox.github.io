梦〔１〕</div>

<p><!--HTMLBUILERPART0-->
　　很多的梦，趁黄昏起哄。<BR><BR> 
　　前梦才挤却大前梦时，后梦又赶走了前梦。<BR><BR> 
　　去的前梦黑如墨，在的后梦墨一般黑；<BR><BR> 
　　去的在的仿佛都说，“看我真好颜色。”<BR><BR> 
　　颜色许好，暗里不知；<BR><BR> 
　　而且不知道，说话的是谁？<BR><BR> 
　　暗里不知，身热头痛。<BR><BR> 
　　你来你来！明白的梦。<BR><BR> 
　　〔１〕　本篇最初发表于一九一八年五月十五日北京《新青年》月刊第四卷第五号，署名唐俟。<!--/HTMLBUILERPART0--> <br>
