别诸弟三首庚子二月〔１〕</div>

<p><!--HTMLBUILERPART0-->
　　谋生无奈日奔驰，有弟偏教各别离。<BR><BR> 
　　最是令人凄绝处，孤檠长夜雨来时。<BR><BR> 
　　还家未久又离家，日暮新愁分外加。<BR><BR> 
　　夹道万株杨柳树，望中都化断肠花。<BR><BR> 
　　从来一别又经年，万里长风送客船。<BR><BR> 
　　我有一言应记取，文章得失不由天。<BR><BR> 
　　〔１〕　本篇录自周作人日记，题下署“豫才未是草”。一九○○年一月二十六日，鲁迅由江南陆师学堂附设的矿路学堂回家度岁，二月十九日返校后写了这三首惜别的诗。<!--/HTMLBUILERPART0--> <br>
