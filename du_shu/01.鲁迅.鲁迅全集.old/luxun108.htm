<p><!--HTMLBUILERPART0-->
　　人睡到不知道时候的时候，就会有影来告别，说出那些话――<BR><BR> 
　　有我所不乐意的在天堂里，我不愿去；有我所不乐意的在地狱里，我不愿去；有我所不乐意的在你们将来的黄金世界里，我不愿去。<BR><BR> 
　　然而你就是我所不乐意的。<BR><BR> 
　　朋友，我不想跟随你了，我不愿住。<BR><BR> 
　　我不愿意！<BR><BR>
