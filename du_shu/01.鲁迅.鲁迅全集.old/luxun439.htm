<p><!--HTMLBUILERPART0-->
　　荀继<BR><BR> 
　　从前梁实秋教授曾经说过：穷人总是要爬，往上爬，爬到富翁的地位〔２〕。不但穷人，奴隶也是要爬的，有了爬得上的机会，连奴隶也会觉得自己是神仙，天下自然太平了。<BR><BR> 
　　虽然爬得上的很少，然而个个以为这正是他自己。这样自然都安分的去耕田，种地，拣大粪或是坐冷板凳，克勤克俭，背着苦恼的命运，和自然奋斗着，拚命的爬，爬，爬。可是爬的人那么多，而路只有一条，十分拥挤。老实的照着章程规规矩矩的爬，大都是爬不上
