<!DOCTYPE html>
<html>
  <head>
    <title>jQuery Example</title>
    <script src='jquery-3.6.1.slim.js'></script>
  </head>
  <body>
    <blockquote>
Powerful and flexible as JavaScript is, with a plethora of built-in function, it is still necessary to use additional code for simple things that cannot be achieved natively or with CSS, such as animations, event handling, and asynchronours communication.
    </blockquote>
    <div id='advert'>This is an ad</div>
    <p>This is my <span class='new'>new</span> website</p>
  <script>
    $('blockquote').css('background', 'lime')
    $('#advert').css('border', '2px dashed red')
    $('.new').css('text-decoration', 'underline')
    $('blockquote, #advert, .new').css('font-weight', 'bold')
  </script>
  </body>
</html>
